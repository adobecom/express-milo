name: Simple Release Notification

on:
  push:
    branches:
      - main
      - release-to-slack  # Testing branch
    paths-ignore:
      - 'README.md'
      - 'docs/**'
      - '*.md'

env:
  # Webhook URL (required)
  SLACK_WEBHOOK_URL: ${{ github.ref == 'refs/heads/release-to-slack' && secrets.SLACK_WEBHOOK_URL_TEST || secrets.SLACK_WEBHOOK_URL }}

jobs:
  notify-release:
    runs-on: ubuntu-latest
    if: github.repository_owner == 'adobecom' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/release-to-slack')
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get short SHA
        id: short-sha
        run: echo "short-sha=${GITHUB_SHA::7}" >> $GITHUB_OUTPUT

      - name: Extract PR information
        id: extract-prs
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const isTestMode = context.ref === 'refs/heads/release-to-slack';
            
            console.log(`🔍 Fetching recent PRs with detailed information... (${isTestMode ? 'TEST MODE' : 'PRODUCTION MODE'})`);
            
            // Determine how many PRs to fetch based on mode
            const prLimit = isTestMode ? 15 : 1; // Test with 15 commits
            const commitLimit = isTestMode ? 20 : 5;
            
            console.log(`Mode: ${isTestMode ? 'TEST' : 'PRODUCTION'} - Fetching up to ${prLimit} PR(s) from last ${commitLimit} commits`);
            
            // Get recent commits
            const commits = await github.rest.repos.listCommits({
              owner,
              repo,
              sha: 'main',
              per_page: commitLimit
            });
            
            const mergeCommits = commits.data.filter(commit => 
              commit.commit.message.includes('Merge pull request')
            );
            
            console.log(`Found ${mergeCommits.length} merge commits`);
            
            if (mergeCommits.length === 0) {
              core.setOutput('prList', 'No recent PRs found');
              return;
            }
            
            // Extract PR numbers from merge commits (limit based on mode)
            const prNumbers = mergeCommits.map(commit => {
              const match = commit.commit.message.match(/#(\d+)/);
              return match ? parseInt(match[1]) : null;
            }).filter(num => num !== null).slice(0, prLimit);
            
            console.log(`Extracted PR numbers: ${prNumbers.join(', ')} (limited to ${prLimit})`);
            
            // Get detailed PR information
            const prDetails = [];
            for (const prNumber of prNumbers) {
              try {
                const pr = await github.rest.pulls.get({
                  owner,
                  repo,
                  pull_number: prNumber
                });
                
                const title = pr.data.title;
                const body = pr.data.body || '';
                
                // Look for "Test URLs" section in PR body (contains the changes list)
                let changesInRelease = null;
                let changesMatch = body.match(/## Test URLs\s*\n([\s\S]*?)(?=\n##|\n\*\*|\n###|\n-|\n$)/);
                if (changesMatch) {
                  changesInRelease = changesMatch[1].trim();
                  console.log(`Found "Test URLs" section in PR #${prNumber}`);
                  
                  // Check if it contains GitHub PR URLs (prioritize these)
                  const githubPrUrls = changesInRelease.match(/https:\/\/github\.com\/[^\/]+\/[^\/]+\/pull\/(\d+)/g);
                  if (githubPrUrls && githubPrUrls.length > 0) {
                    console.log(`Found ${githubPrUrls.length} GitHub PR URLs in Test URLs section`);
                    changesInRelease = githubPrUrls.join('\n');
                  } else {
                    // Fallback: look for MWPW patterns in the Test URLs section
                    const mwpwPatterns = changesInRelease.match(/(MWPW-\d+):\s*([^#\n]+?)\s*#(\d+)/g);
                    if (mwpwPatterns && mwpwPatterns.length > 0) {
                      console.log(`Found ${mwpwPatterns.length} MWPW patterns in Test URLs section`);
                      changesInRelease = mwpwPatterns.join('\n');
                    } else {
                      // No valid content found in Test URLs section, set to null
                      console.log(`No valid GitHub PR URLs or MWPW patterns found in Test URLs section`);
                      changesInRelease = null;
                    }
                  }
                } else {
                  // Fallback: look for various patterns that developers use
                  const patterns = [
                    // MWPW-XXXXXX: description #XXX
                    /(MWPW-\d+):\s*([^#\n]+?)\s*#(\d+)/g,
                    // MWPW-XXXXXX description #XXX (no colon)
                    /(MWPW-\d+)\s+([^#\n]+?)\s*#(\d+)/g,
                    // Just MWPW-XXXXXX #XXX (no description)
                    /(MWPW-\d+)\s*#(\d+)/g,
                    // Any ticket pattern: description #XXX
                    /([A-Z]+-\d+):\s*([^#\n]+?)\s*#(\d+)/g,
                    // Just ticket #XXX
                    /([A-Z]+-\d+)\s*#(\d+)/g
                  ];
                  
                  let allMatches = [];
                  patterns.forEach(pattern => {
                    const matches = body.match(pattern);
                    if (matches) {
                      allMatches = allMatches.concat(matches);
                    }
                  });
                  
                  if (allMatches.length > 0) {
                    changesInRelease = allMatches.join('\n');
                    console.log(`Found various pattern matches in PR #${prNumber}: ${allMatches.length} items`);
                  }
                }
                
                // Look for ticket numbers in various formats
                let ticketNumber = null;
                let cleanTitle = title;
                
                // Check title first (MWPW-XXXXXX pattern)
                const titleMatch = title.match(/(MWPW-\d+)/);
                if (titleMatch) {
                  ticketNumber = titleMatch[1];
                  cleanTitle = title.replace(`${ticketNumber}: `, '');
                } else {
                  // Check PR body for ticket numbers
                  const bodyMatch = body.match(/(MWPW-\d+)/);
                  if (bodyMatch) {
                    ticketNumber = bodyMatch[1];
                  }
                  
                  // Also check for other ticket patterns in body
                  const otherTicketMatch = body.match(/([A-Z]+-\d+)/);
                  if (otherTicketMatch && !ticketNumber) {
                    ticketNumber = otherTicketMatch[1];
                  }
                }
                
                prDetails.push({
                  number: prNumber,
                  title: cleanTitle,
                  originalTitle: title,
                  body: body,
                  ticketNumber: ticketNumber,
                  url: pr.data.html_url,
                  changesInRelease: changesInRelease
                });
                
                console.log(`PR #${prNumber}: "${cleanTitle}" ${ticketNumber ? `(Ticket: ${ticketNumber})` : '(No ticket found)'} ${changesInRelease ? '(Has Changes section)' : ''}`);
                
              } catch (error) {
                console.log(`Failed to get PR #${prNumber}: ${error.message}`);
              }
            }
            
            // Format the PR list - show ALL PRs with their available information
            let prList = '';
            
            console.log(`Formatting ${prDetails.length} PRs with available information`);
            
            prDetails.forEach(pr => {
              // Check if this PR has a "Test URLs" section or MWPW patterns
              if (pr.changesInRelease) {
                console.log(`PR #${pr.number} has changes section, using it`);
                
                // Use the changes section from this PR
                const changes = pr.changesInRelease
                  .split('\n')
                  .filter(line => line.trim() && !line.startsWith('#'))
                  .map(line => {
                    // Handle GitHub URLs (from Test URLs section)
                    const githubUrlMatch = line.match(/https:\/\/github\.com\/[^\/]+\/[^\/]+\/pull\/(\d+)/);
                    if (githubUrlMatch) {
                      const prNum = githubUrlMatch[1];
                      // Try to find the PR title from the prDetails array
                      const prInfo = prDetails.find(p => p.number == prNum);
                      if (prInfo) {
                        const displayTitle = prInfo.ticketNumber ? `${prInfo.ticketNumber}: ${prInfo.title}` : prInfo.title;
                        return `- <https://github.com/${owner}/${repo}/pull/${prNum}|${displayTitle}> (#${prNum})`;
                      } else {
                        return `- <https://github.com/${owner}/${repo}/pull/${prNum}|PR #${prNum}>`;
                      }
                    }
                    
                    // Skip test URLs (before/after URLs) - we only want GitHub PRs and MWPW patterns
                    const testUrlMatch = line.match(/https:\/\/[^\/]*--express-milo--adobecom\.(aem|hlx)\.(page|live)/);
                    if (testUrlMatch) {
                      console.log(`Skipping test URL: ${line}`);
                      return null; // Skip this line
                    }
                    
                    // Convert various ticket patterns to links
                    const patterns = [
                      // MWPW-XXXXXX: description #XXX
                      { regex: /(MWPW-\d+):\s*(.+?)\s*#(\d+)/, format: (ticket, desc, pr) => `${ticket}: ${desc.trim()}` },
                      // MWPW-XXXXXX description #XXX (no colon)
                      { regex: /(MWPW-\d+)\s+(.+?)\s*#(\d+)/, format: (ticket, desc, pr) => `${ticket}: ${desc.trim()}` },
                      // Just MWPW-XXXXXX #XXX (no description)
                      { regex: /(MWPW-\d+)\s*#(\d+)/, format: (ticket, pr) => `${ticket}` },
                      // Any ticket pattern: description #XXX
                      { regex: /([A-Z]+-\d+):\s*(.+?)\s*#(\d+)/, format: (ticket, desc, pr) => `${ticket}: ${desc.trim()}` },
                      // Just ticket #XXX
                      { regex: /([A-Z]+-\d+)\s*#(\d+)/, format: (ticket, pr) => `${ticket}` }
                    ];
                    
                    for (const pattern of patterns) {
                      const match = line.match(pattern.regex);
                      if (match) {
                        const ticket = match[1];
                        const prNum = match[match.length - 1]; // Last capture group is always PR number
                        const description = match.length === 4 ? match[2] : ''; // Has description if 4 groups
                        const displayText = pattern.format(ticket, description, prNum);
                        return `- <https://jira.corp.adobe.com/browse/${ticket}|${displayText}> (#${prNum})`;
                      }
                    }
                    
                    return line.trim();
                  })
                  .filter(item => item !== null) // Remove null values (skipped test URLs)
                  .join('\n');
                
                prList += changes + '\n';
              } else {
                // Fallback to individual PR formatting
                console.log(`PR #${pr.number} using individual formatting`);
                if (pr.ticketNumber) {
                  // Show ticket number in title, link to Jira, show GitHub PR at end
                  const displayTitle = `${pr.ticketNumber}: ${pr.title}`;
                  prList += `- <https://jira.corp.adobe.com/browse/${pr.ticketNumber}|${displayTitle}> (#${pr.number})\n`;
                } else {
                  // Link to GitHub PR
                  prList += `- <https://github.com/${owner}/${repo}/pull/${pr.number}|${pr.title}> (#${pr.number})\n`;
                }
              }
            });
            
            // Set the output properly
            core.setOutput('prList', prList);
            console.log(`✅ PR list extracted and output set (${prDetails.length} PRs)`);

      - name: Send release notification
        if: success() && env.SLACK_WEBHOOK_URL != '' && steps.extract-prs.outputs.prList != ''
        run: |
          curl -X POST -H 'Content-type: application/json' \
            --data '{
              "text": "🚀 *Express Milo Release Deployed* ${{ github.ref == 'refs/heads/release-to-slack' && '(TEST MODE)' || '' }}",
              "attachments": [
                {
                  "color": "good",
                  "fields": [
                    {
                      "title": "Repository",
                      "value": "${{ github.repository }}",
                      "short": true
                    },
                    {
                      "title": "Branch",
                      "value": "${{ github.ref_name }}",
                      "short": true
                    },
                    {
                      "title": "Commit",
                      "value": "<https://github.com/${{ github.repository }}/commit/${{ github.sha }}|${{ steps.short-sha.outputs.short-sha }}>",
                      "short": true
                    }
                  ]
                },
                {
                  "color": "#f0f0f0",
                  "fields": [
                    {
                      "title": "Live URLs",
                      "value": "<https://main--express-milo--adobecom.aem.page/express|main--express-milo--adobecom.aem.page/express>\n<https://adobecom.com/express|adobecom.com/express>",
                      "short": false
                    }
                  ]
                },
                {
                  "color": "#36a64f",
                  "text": "*Changes in this Release:*\n${{ steps.extract-prs.outputs.prList }}",
                  "mrkdwn_in": ["text"]
                }
              ],
              "footer": "Express Milo",
              "footer_icon": "https://github.com/adobecom/express-milo/raw/main/express/code/img/favicon.ico"
            }' \
            ${{ env.SLACK_WEBHOOK_URL }}

      - name: Fallback notification
        if: failure() && env.SLACK_WEBHOOK_URL != ''
        run: |
          echo "❌ Release notification failed"
          echo "Commit: ${{ github.sha }}"
          echo "Repository: ${{ github.repository }}"
